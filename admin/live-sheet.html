<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Orders — Boffo's</title>
<style>
:root{
    --red:#8B1E1E; --red-dark:#651414;
    --green:#1a6b3c; --gold:#C9A55B;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    background:#f5f5f3; color:#333; min-height:100vh;
}

/* HEADER */
.header{
    background:var(--red);
    padding:14px 24px;
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; flex-wrap:wrap; position:sticky; top:0; z-index:100;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.header-left{ display:flex; align-items:center; gap:14px; }
.header-logo{ color:white; font-weight:700; font-size:1rem; letter-spacing:1px; }
.sse-dot{
    width:9px; height:9px; border-radius:50%;
    background:#888; display:inline-block; transition:background .3s;
}
.sse-dot.connected{ background:#4cdf80; animation:pulse 2s infinite; }
.sse-dot.error{ background:#ff6b6b; }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
.sse-label{ color:rgba(255,255,255,.7); font-size:.78rem; }
.header-right{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.header-count{ color:rgba(255,255,255,.75); font-size:.82rem; }
.btn{
    padding:7px 16px; border:none; border-radius:4px;
    font-weight:600; font-size:.8rem; cursor:pointer;
}
.btn-white{ background:white; color:var(--red); }
.btn-white:hover{ background:#f0f0f0; }
.btn-outline{ background:transparent; color:white; border:1px solid rgba(255,255,255,.4); }
.btn-outline:hover{ border-color:white; }

/* FILTERS */
.filters{
    padding:12px 24px; background:white; border-bottom:1px solid #e0e0e0;
    display:flex; gap:12px; align-items:center; flex-wrap:wrap;
}
.filters label{ font-size:.8rem; font-weight:600; color:#666; }
.filters select, .filters input{
    padding:6px 10px; border:1px solid #ccc; border-radius:4px;
    font-size:.82rem; font-family:inherit; background:white;
}
.filters select:focus, .filters input:focus{ outline:2px solid var(--gold); }

/* LEGEND */
.legend{
    padding:8px 24px; background:white; border-bottom:1px solid #e8e8e8;
    display:flex; gap:12px; align-items:center;
}
.legend-label{ font-size:.75rem; color:#888; margin-right:4px; }
.legend-chip{
    padding:3px 10px; border-radius:12px; font-size:.72rem; font-weight:600;
}
.chip-pending  { background:#fff3cd; color:#7a5000; border:1px solid #ffc107; }
.chip-completed{ background:#d4edda; color:#1a5c2a; border:1px solid #a3d9b1; }
.chip-cancelled{ background:#fdecea; color:#c0392b; border:1px solid #f5b7b1; }

/* TABLE */
.table-wrap{
    padding:16px 24px 40px;
    overflow-x:auto;
}
table{
    width:100%; border-collapse:collapse;
    background:white; border-radius:6px;
    overflow:hidden; box-shadow:0 2px 10px rgba(0,0,0,.08);
    min-width:860px; font-size:.87rem;
}
thead tr{ background:var(--red); color:white; }
thead th{
    padding:11px 14px; text-align:left; font-weight:600;
    font-size:.78rem; letter-spacing:.4px; text-transform:uppercase;
    white-space:nowrap; cursor:pointer; user-select:none;
    transition:background .15s;
}
thead th:hover{ background:var(--red-dark); }
thead th.sorted{ background:var(--red-dark); }
thead th.no-sort{ cursor:default; }
thead th.no-sort:hover{ background:var(--red); }
.sa{ font-size:.7rem; margin-left:4px; opacity:.5; }
thead th.sorted .sa{ opacity:1; }
tbody tr{ border-bottom:1px solid #eee; transition:filter .1s; }
tbody tr:hover{ filter:brightness(.97); }

/* ROW COLORS */
.row-pending  { background:#ffffff; }
.row-completed{ background:#edfaf0; }
.row-cancelled{ background:#fdf0f0; }

tbody td{ padding:11px 14px; vertical-align:top; line-height:1.4; }
.badge{
    display:inline-block; padding:2px 8px; border-radius:10px;
    font-size:.72rem; font-weight:700;
}
.badge-pending  { background:#fff3cd; color:#7a5000; }
.badge-completed{ background:#d4edda; color:#1a5c2a; }
.badge-cancelled{ background:#fdecea; color:#c0392b; }
.badge-christmas   { background:#d4edda; color:#1a5c2a; }
.badge-thanksgiving{ background:#fff3cd; color:#7a5000; }
.badge-easter      { background:#f0e6ff; color:#5a2d8a; }
.badge-default     { background:#e9ecef; color:#444; }

.pickup-time{ display:block; font-size:.8rem; color:var(--green); font-weight:600; margin-top:2px; }
.item-note{ display:block; font-size:.74rem; color:#888; font-style:italic; margin-top:1px; }
.items-cell ul{ margin:0; padding:0 0 0 14px; }
.items-cell ul li{ margin-bottom:2px; }
.empty-msg{ text-align:center; color:#aaa; padding:60px; font-size:1rem; }

/* UPDATED FLASH */
@keyframes flash{ 0%{background:rgba(200,255,200,.6);} 100%{background:transparent;} }
.just-updated{ animation:flash 1.2s ease; }

/* PRINT */
@media print{
    .header{ position:static; background:var(--red) !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .filters,.legend{ display:none; }
    .table-wrap{ padding:8px 0; }
    table{ box-shadow:none; font-size:.8rem; }
    thead tr{ background:var(--red) !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .row-completed{ background:#d4edda !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .row-cancelled{ background:#fdecea !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .btn{ display:none; }
}

/* NOT LOGGED IN */
.auth-wall{
    max-width:380px; margin:80px auto; padding:40px;
    background:white; border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,.12);
    text-align:center;
}
.auth-wall h2{ color:var(--red); margin-bottom:10px; }
.auth-wall p{ font-size:.9rem; color:#888; margin-bottom:24px; }
.auth-wall a{
    display:inline-block; padding:12px 28px; background:var(--red);
    color:white; text-decoration:none; border-radius:4px; font-weight:700;
}
.auth-wall a:hover{ background:var(--red-dark); }
</style>
</head>
<body>

<div id="authWall" style="display:none;">
    <div class="auth-wall">
        <h2>Boffo's Live Orders</h2>
        <p>You need to be logged into the admin panel to view the live order sheet.</p>
        <a href="/admin/login.html">Log In →</a>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <div class="header-left">
            <span class="header-logo">BOFFO'S — LIVE ORDERS</span>
            <span class="sse-dot" id="sseDot"></span>
            <span class="sse-label" id="sseLabel">Connecting…</span>
        </div>
        <div class="header-right">
            <span class="header-count" id="headerCount"></span>
            <button class="btn btn-outline" onclick="window.print()">🖨 Print</button>
            <a class="btn btn-white" href="/admin/dashboard.html">Dashboard →</a>
        </div>
    </div>

    <div class="filters">
        <label>Menu:</label>
        <select id="filterMenu" onchange="render()">
            <option value="">All menus</option>
            <option value="christmas">🎄 Christmas</option>
            <option value="thanksgiving">🦃 Thanksgiving</option>
            <option value="easter">🐣 Easter</option>
        </select>
        <label>Status:</label>
        <select id="filterStatus" onchange="render()">
            <option value="">All</option>
            <option value="pending">Pending</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
        </select>
        <label>Date:</label>
        <input type="date" id="filterDate" onchange="render()">
        <button class="btn" onclick="clearFilters()" style="background:#f0f0f0;color:#555;">Clear</button>
        <span style="margin-left:auto;font-size:.75rem;color:#aaa;" id="lastUpdated"></span>
    </div>

    <div class="legend">
        <span class="legend-label">Key:</span>
        <span class="legend-chip chip-pending">● Pending</span>
        <span class="legend-chip chip-completed">✓ Completed</span>
        <span class="legend-chip chip-cancelled">✕ Cancelled</span>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th data-col="id"          onclick="sortBy('id')"         >#<span class="sa">↕</span></th>
                    <th data-col="status"      onclick="sortBy('status')"     >Status<span class="sa">↕</span></th>
                    <th data-col="menu"        onclick="sortBy('menu')"       >Menu<span class="sa">↕</span></th>
                    <th data-col="customer"    onclick="sortBy('customer')"   >Customer<span class="sa">↕</span></th>
                    <th class="no-sort">Email / Phone</th>
                    <th data-col="pickup_date" onclick="sortBy('pickup_date')">Pickup Date<span class="sa">↕</span></th>
                    <th data-col="pickup_time" onclick="sortBy('pickup_time')">Pickup Time<span class="sa">↕</span></th>
                    <th class="no-sort">Items Ordered</th>
                    <th data-col="total"       onclick="sortBy('total')"      >Total<span class="sa">↕</span></th>
                </tr>
            </thead>
            <tbody id="orderBody">
                <tr><td colspan="9" class="empty-msg">Loading orders…</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script>
const MENU_META = {
    christmas:    { emoji:'🎄', label:'Christmas',    badge:'badge-christmas'    },
    thanksgiving: { emoji:'🦃', label:'Thanksgiving', badge:'badge-thanksgiving' },
    easter:       { emoji:'🐣', label:'Easter',       badge:'badge-easter'       }
};

let allOrders = [];
let prevOrderIds = new Set();
let sortCol = 'pickup_date';
let sortAsc = true;

function sortBy(col){
    sortCol === col ? sortAsc = !sortAsc : (sortCol = col, sortAsc = true);
    updateSortHeaders();
    render();
}

function updateSortHeaders(){
    document.querySelectorAll('thead th[data-col]').forEach(th => {
        const active = th.dataset.col === sortCol;
        th.classList.toggle('sorted', active);
        const sa = th.querySelector('.sa');
        if(sa) sa.textContent = active ? (sortAsc ? '↑' : '↓') : '↕';
    });
}

function getFiltered(){
    const mf = document.getElementById("filterMenu").value;
    const sf = document.getElementById("filterStatus").value;
    const df = document.getElementById("filterDate").value;
    return allOrders
        .filter(o => (!mf||o.menu_slug===mf) && (!sf||(o.status||'pending')===sf) && (!df||o.pickup_date===df))
        .sort((a,b) => {
            let av, bv;
            switch(sortCol){
                case 'id':
                    av = a.id; bv = b.id; break;
                case 'status':
                    av = a.status||'pending'; bv = b.status||'pending'; break;
                case 'menu':
                    av = a.menu_slug||''; bv = b.menu_slug||''; break;
                case 'customer':
                    av = a.customer_name||''; bv = b.customer_name||''; break;
                case 'pickup_time':
                    av = a.pickup_time||''; bv = b.pickup_time||''; break;
                case 'total':
                    av = a.total; bv = b.total; break;
                case 'pickup_date':
                default:
                    // Default: sort by date then time together
                    av = (a.pickup_date||'') + (a.pickup_time||'');
                    bv = (b.pickup_date||'') + (b.pickup_time||'');
            }
            if(typeof av === 'string') av = av.toLowerCase();
            if(typeof bv === 'string') bv = bv.toLowerCase();
            if(av < bv) return sortAsc ? -1 : 1;
            if(av > bv) return sortAsc ?  1 : -1;
            return 0;
        });
}

function fmt12(t){
    if(!t) return '—';
    const [h,m] = t.split(':').map(Number);
    const p = h>=12?'PM':'AM', h12=h>12?h-12:h===0?12:h;
    return `${h12}:${String(m).padStart(2,'0')} ${p}`;
}
function formatDate(d){
    return new Date(d+'T00:00:00').toLocaleDateString('en-CA',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
}

/* ── SESSION CHECK ── */
async function checkAuth(){
    try{
        const { data: { session } } = await sb.auth.getSession();
        if(!session){
            document.getElementById("authWall").style.display = "block";
            return false;
        }
        document.getElementById("app").style.display = "block";
        return true;
    } catch(e){
        document.getElementById("authWall").style.display = "block";
        return false;
    }
}

/* ── DATA ── */
async function loadOrders(){
    try{
        const { data, error } = await sb.from('orders').select('*').order('created_at',{ascending:false});
        if(error) throw error;
        allOrders = data;
        document.getElementById("lastUpdated").textContent =
            `Last updated: ${new Date().toLocaleTimeString('en-CA', {hour:'2-digit', minute:'2-digit', second:'2-digit'})}`;
        render();
    } catch(e){ console.error('Failed to load orders', e); }
}

function clearFilters(){
    document.getElementById("filterMenu").value='';
    document.getElementById("filterStatus").value='';
    document.getElementById("filterDate").value='';
    render();
}

function render(){
    const orders  = getFiltered();
    const body    = document.getElementById("orderBody");
    const countEl = document.getElementById("headerCount");

    const pending   = orders.filter(o=>!o.status||o.status==='pending').length;
    const completed = orders.filter(o=>o.status==='completed').length;
    const cancelled = orders.filter(o=>o.status==='cancelled').length;
    countEl.textContent = `${orders.length} orders · ${pending} pending · ${completed} completed · ${cancelled} cancelled`;

    if(!orders.length){
        body.innerHTML = '<tr><td colspan="9" class="empty-msg">No orders match the current filters.</td></tr>';
        prevOrderIds = new Set();
        return;
    }

    const newIds = new Set(orders.map(o=>o.id));

    body.innerHTML = orders.map(o => {
        const status = o.status || 'pending';
        const m = MENU_META[o.menu_slug]||{emoji:'🍽️',label:o.menu_slug||'—',badge:'badge-default'};
        const statusBadge = status==='completed'
            ? '<span class="badge badge-completed">✓ Completed</span>'
            : status==='cancelled'
            ? '<span class="badge badge-cancelled">✕ Cancelled</span>'
            : '<span class="badge badge-pending">● Pending</span>';
        const items = o.items.map(i =>
            `<li>${i.qty}× ${i.name}${i.notes?`<span class="item-note">${i.notes}</span>`:''}</li>`
        ).join('');
        // Flash rows that changed since last render
        const isNew = !prevOrderIds.has(o.id);
        return `<tr class="row-${status}${isNew?' just-updated':''}" id="row-${o.id}">
            <td><strong>#${o.id}</strong></td>
            <td>${statusBadge}</td>
            <td><span class="badge ${m.badge}">${m.emoji} ${m.label}</span></td>
            <td><strong>${o.customer_name}</strong></td>
            <td>
                <a href="mailto:${o.customer_email}" style="color:var(--red);text-decoration:none;display:block;font-size:.82rem;">${o.customer_email}</a>
                <a href="tel:${o.customer_phone}"    style="color:var(--red);text-decoration:none;display:block;font-size:.82rem;">${o.customer_phone}</a>
            </td>
            <td style="white-space:nowrap;">${formatDate(o.pickup_date)}</td>
            <td style="white-space:nowrap;font-weight:600;color:var(--green);">${fmt12(o.pickup_time)}</td>
            <td class="items-cell"><ul>${items}</ul></td>
            <td style="font-weight:700;color:var(--red-dark);">$${o.total.toFixed(2)}</td>
        </tr>`;
    }).join('');

    prevOrderIds = newIds;
}

/* ── SSE ── */
function connectSSE(){
    const dot   = document.getElementById("sseDot");
    const label = document.getElementById("sseLabel");
    sb.channel('live-sheet-orders')
        .on('postgres_changes', { event:'*', schema:'public', table:'orders' }, ()=>{
            loadOrders();
        })
        .subscribe((status)=>{
            if(status === 'SUBSCRIBED'){
                dot.className = 'sse-dot connected';
                label.textContent = 'Live';
            } else if(status === 'CHANNEL_ERROR' || status === 'TIMED_OUT'){
                dot.className = 'sse-dot error';
                label.textContent = 'Reconnecting…';
            }
        });
}

/* ── INIT ── */
(async () => {
    const authed = await checkAuth();
    if(!authed) return;
    await loadOrders();
    connectSSE();
})();
</script>
</body>
</html>
